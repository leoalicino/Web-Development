<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="index.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="website icon" type="image" href="icona.png">
  <title>Il bro guarda il mio meteo</title>
</head>

<body onload="prendiGeolocalizione()">
  <div class="box">

    <div class="search">
      <input type="text" class="search-bar" placeholder="Cerca" id="input">
      <button onclick="showCitta()">
        <svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024" height="1.5em"
          width="1.5em" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z">
          </path>
        </svg>
      </button>
    </div>

    <div class="class-citta">
      <h2 id="citta"></h2>
      <h4 id="data"></h4>
      <div class="icona" id="icona-meteo"></div>
    </div>


    <h1 id="temperatura"></h1>
    <h3 id="descrizione"></h3>
    <div class="class-informazioni">
      <div id="class-pressione">
      </div>
      <div id="class-umidita">
      </div>
      <div id="class-vento">
      </div>
      <div id="class-precipitazioni">
      </div>
      <br>
    </div>
    <div class="settimane-box" id="meteo-settimana" hidden="true">
      <ul class="settimane-list">
        <li id="attivo0" onclick="meteoSettimanale(0)"><i class="day-icon" id="giorno0"></i><span
            class="day-name"><br>Oggi</span><span id="temp-day1" class="day-temp"></span></li>
        <li id="attivo8" onclick="meteoSettimanale(8)"><i class="day-icon" id="giorno8"></i><span id="day2"
            class="day-name"></span><span id="temp-day2" class="day-temp"></span></li>
        <li id="attivo16" onclick="meteoSettimanale(16)"><i class="day-icon" id="giorno16"></i><span id="day3"
            class="day-name"></span><span id="temp-day3" class="day-temp"></span></li>
        <li id="attivo24" onclick="meteoSettimanale(24)"><i class="day-icon" id="giorno24"></i><span id="day4"
            class="day-name"></span><span id="temp-day4" class="day-temp"></span></li>
      </ul>


      <!-- Link Instagram -->
      <br>
      <!-- <a href="https://www.instagram.com/leoalicino/" target="_blank" id="instagram"><ion-icon name="logo-instagram"></ion-icon></a> -->
    </div>
</body>

</html>
